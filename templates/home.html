<!DOCTYPE html>
<html lang="en">
<head>
    <title>Drinking Fountains Database</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
<script>
navigator.geolocation.getCurrentPosition(function(location) {
	window.location = "/location/" + location.coords.latitude +
		"," + location.coords.longitude;
});

setTimeout(function() {
	window.location = "/location/" + 41.6013178 + "," + (-93.655257);
}, 5000);

</script>
</head>
<body>
    <!-- display a flash message here, if necessary -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <div class="content">
    <h1>Drinking Fountain Database</h1>
    <p>
        If the location permission does not show up, you will be redirected
        in 5 seconds.
    </p>
    </div>
</body>
</html>
