<!DOCTYPE html>
<html lang="en">
<head>
    <title>User {{ username }}</title>
    <!-- Bootstrap CSS for styling the table -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2 class="mt-5">User {{ username }</h2>
        <p>
          These are the hacks that {{ username }} is credited with:
        </p>
        <table class="table table-bordered table-striped mt-3">
            <thead class="thead-dark"> <!-- creates a dark background for the table header -->
                <tr>
                    <th>Hack Name</th>
                    <th>Category</th>
                </tr>
            </thead>
            <tbody>
                {% for hack in hacks %}
                <tr>
                    <td><a href="#">{{ hack['Title'] }}</a></td>
                    <td>{{ hack['Type'] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
 </body>
</html>
